  <script>
    const sheetURL =
      "https://opensheet.elk.sh/1FUCNLl0RC4li5-3wrw2zP3ZR-2FPE8QiuFu9cRobl0o/Sheet1";

    let allData = [];
    let displayIndex = 0;
    const batchSize = 50;

    async function fetchData() {
      const res = await fetch(sheetURL);
      allData = await res.json();
      loadMore();
    }

    function loadMore() {
      const tableBody = document.getElementById("tableBody");
      const nextIndex = displayIndex + batchSize;
      const chunk = allData.slice(displayIndex, nextIndex);

      chunk.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.TimeStamp}</td>
          <td>${row.Pname}</td>
          <td>${row.Address}</td>
          <td><a href="tel:${row.Whatsapp}">${row.Whatsapp}</a></td>
          <td><a href="https://wa.me/${row.Whatsapp}" target="_blank">${row.Whatsapp}</a></td>
          <td>${row.Category}</td>
          <td>${row.Code}</td>
          <td>
                <button onclick="alert('${row.Description.replace(/'/g, "\\'")}')">massege</button>
            </td>
          <td>${row.Taka}</td>
          <td>
                <button onclick="window.open('${row.Image}', '_blank')">View</button>
            </td>
        `;
        tableBody.appendChild(tr);
      });

      displayIndex = nextIndex;

      if (displayIndex >= allData.length) {
        document.getElementById("loadMoreBtn").style.display = "none";
      }
    }

    function searchTable() {
      const value = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#dataTable tbody tr");

      rows.forEach((row) => {
        row.style.display = row.innerText.toLowerCase().includes(value)
          ? ""
          : "none";
      });
    }

 // Donate Form
    function openDonateForm(){document.getElementById("donateModal").style.display="flex";}
    function closeDonateForm(){document.getElementById("donateModal").style.display="none";}
    function submitDonate(){
      const d={Pname:dPname.value,Address:dAddress.value,Whatsapp:dWhatsapp.value,Category:dCategory.value,Code:dCode.value,Description:dDescription.value,Taka:dTaka.value,Image:dImage.value};
      fetch("https://script.google.com/macros/s/AKfycbyGGl_IOEDF5-aQtuqcOuH3tgsAAz-GLDyORdVu0ulHt-quAvDnR78K09BSpSQnPsfM/exec",{method:"POST",body:JSON.stringify(d)})
      .then(()=>{alert("job post has been added and sometime under review  ");closeDonateForm();});
    }

    
    function showTotalStudents() {
      alert(`Total: ${allData.length}`);
    }

    function showByDistrict() {
      const map = {};
      allData.forEach((d) => {
        map[d.Address] = (map[d.Address] || 0) + 1;
      });

      let text = "Address:\n";
      Object.keys(map).forEach((Address) => {
        text += `${Address}: ${map[Address]} people\n`;
      });

      alert(text);
    }

function showByCategory() {
      const map = {};
      allData.forEach((d) => {
        map[d.Category] = (map[d.Category] || 0) + 1;
      });

      let text = "Category:\n";
      Object.keys(map).forEach((Category) => {
        text += `${Category}: ${map[Category]} people\n`;
      });

      alert(text);
    }

    
    function showToday() {
  const now = new Date();
  const d = now.getDate();
  const m = now.getMonth();
  const y = now.getFullYear();

  const count = allData.filter((row) => {
    const t = new Date(row.Timestamp);
    return (
      t.getDate() === d &&
      t.getMonth() === m &&
      t.getFullYear() === y
    );
  }).length;

  alert(`Today: ${count} people`);
}

    function showThisMonth() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const year = now.getFullYear();

      const count = allData.filter((d) => {
        const date = new Date(d.Timestamp);
        return (
          date.getMonth() + 1 === month &&
          date.getFullYear() === year
        );
      }).length;

      alert(`month: ${count} people`);
    }

    function showTotalMoney() {
      const total = allData.reduce((sum, d) => sum + Number(d.Taka || 0), 0);
      alert(`Total tk: ${total} tk`);
    }

    function showTotalDeposit() {
      const total = allData.reduce((sum, d) => sum + Number(d.Joma || 0), 0);
      alert(`joma: ${total} tk`);
    }

    
    fetchData();
  </script>
