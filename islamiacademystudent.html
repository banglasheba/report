<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>islami academy student</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: auto;
      padding: 0;
    }
    .container {
      border: 4px;
      border-radius: 10px;

      width: 100%;
      margin: auto;
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #222;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .stats button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .stats button:hover {
      background: #0056b3;
    }
    .search-box {
      margin-bottom: 15px;
      text-align: center;
    }
    .search-box input {
      width: 90%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      table-layout: auto;
    }
    th, td {
      border: 2px solid #555;
      padding: 10px;
      text-align: center;
      white-space: nowrap;
      min-width: 40px;
      font-weight: bold;
    }
    th {
      background: #333;
      color: white;
    }
    .load-more {
      text-align: center;
      margin: 20px 0;
    }
    .load-more button {
      padding: 10px 15px;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .load-more button:hover {
      background: #1e7e34;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>student of islami academy</h2>

    <!-- Top Buttons -->
 <h2></h2>
<p>Total: <span id="total">Loading...</span></p>
<p>Today: <span id="today">Loading...</span></p>

<!-- Buttons -->
<button onclick="showArea()">Area</button>
<button onclick="showCategory()">Category</button>

<!-- Data show -->
<ul id="dataList"></ul>
    
    <!--
    <div class="stats">
      <button onclick="showTotalStudents()">Total</button>

    <!-- Search Box -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder=" সার্চ করুন" onkeyup="searchTable()" />
    </div>

    <!-- Data Table -->
    <table id="dataTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Address</th>
          <th>Phone</th>
          <th>institution</th>
          <th>Code</th>
          <th>Category</th>
          <th>Taka</th>
          <th>Details</th>
          <th>Whatsapp</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <!-- Load More Button -->
    <div class="load-more">
      <button id="loadMoreBtn" onclick="loadMore()">Load More</button>
    </div>
  </div>

  <script>
    const sheetURL =
      "https://opensheet.elk.sh/1uzehSN2lGI6gNlM8w3eHEEbyZ14UcoRCBuOldH0Rljc/Sheet2";

    let allData = [];
    let displayIndex = 0;
    const batchSize = 50;

    async function fetchData() {
      const res = await fetch(sheetURL);
      allData = await res.json();
      loadMore();
    }

    function loadMore() {
      const tableBody = document.getElementById("tableBody");
      const nextIndex = displayIndex + batchSize;
      const chunk = allData.slice(displayIndex, nextIndex);

      chunk.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.TimeStamp}</td>
          <td>${row.Name}</td>
          <td>${row.Address}</td>
          <td><a href="tel:${row.Phone}">${row.Phone}</a></td>
          <td>${row.Product}</td>
          <td>${row.Code}</td>
          <td>${row.Category}</td>
          
          <td>${row.Price}</td>
          <td>
                <button onclick="alert('${row.Details.replace(/'/g, "\\'")}')">massege</button>
            </td>
          <td>${row.Whatsapp}</td>
        `;
        tableBody.appendChild(tr);
      });

      displayIndex = nextIndex;

      if (displayIndex >= allData.length) {
        document.getElementById("loadMoreBtn").style.display = "none";
      }
    }

    function searchTable() {
      const value = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#dataTable tbody tr");

      rows.forEach((row) => {
        row.style.display = row.innerText.toLowerCase().includes(value)
          ? ""
          : "none";
      });
    }

    function showTotalStudents() {
      alert(`Total: ${allData.length}`);
    }

    function showByDistrict() {
      const map = {};
      allData.forEach((d) => {
        map[d.Address] = (map[d.Address] || 0) + 1;
      });

      let text = "Address:\n";
      Object.keys(map).forEach((Address) => {
        text += `${Address}: ${map[Address]} people\n`;
      });

      alert(text);
    }

function showByCode() {
      const map = {};
      allData.forEach((d) => {
        map[d.Code] = (map[d.code] || 0) + 1;
      });

      let text = "Code:\n";
      Object.keys(map).forEach((Code) => {
        text += `${Code}: ${map[Code]} people\n`;
      });

      alert(text);
    }

    
    function showToday() {
  const now = new Date();
  const d = now.getDate();
  const m = now.getMonth();
  const y = now.getFullYear();

  const count = allData.filter((row) => {
    const t = new Date(row.Timestamp);
    return (
      t.getDate() === d &&
      t.getMonth() === m &&
      t.getFullYear() === y
    );
  }).length;

  alert(`Today: ${count} people`);
}

    function showThisMonth() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const year = now.getFullYear();

      const count = allData.filter((d) => {
        const date = new Date(d.Timestamp);
        return (
          date.getMonth() + 1 === month &&
          date.getFullYear() === year
        );
      }).length;

      alert(`month: ${count} people`);
    }

    function showTotalMoney() {
      const total = allData.reduce((sum, d) => sum + Number(d.Taka || 0), 0);
      alert(`Total tk: ${total} tk`);
    }

    function showTotalDeposit() {
      const total = allData.reduce((sum, d) => sum + Number(d.Joma || 0), 0);
      alert(`joma: ${total} tk`);
    }

    fetchData();

    
  </script>

 

<script>
fetch("https://opensheet.elk.sh/1r3x6Mt1zPoz4PXmlB25R5qfzLmpO0XJU3MAIGg7MdeE/Sheet1")
  .then(res => res.json())
  .then(data => {

    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];

    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();

    let total = 0;
    let todayCount = 0;
    let monthCount = 0;

    data.forEach(item => {

      total++;

      // Timestamp না থাকলে skip
      if (!item.TimeStamp) return;

      let itemDate = new Date(item.TimeStamp);

      // invalid date skip
      if (isNaN(itemDate)) return;

      let itemDateStr = itemDate.toISOString().split('T')[0];

      // আজকের count
      if (itemDateStr === todayStr) {
        todayCount++;
      }

      // এই মাসের count
      if (
        itemDate.getMonth() === currentMonth &&
        itemDate.getFullYear() === currentYear
      ) {
        monthCount++;
      }

    });

    document.getElementById("total").innerText = total;
    document.getElementById("today").innerText = todayCount;
    document.getElementById("month").innerText = monthCount;

  })
  .catch(err => {
    console.error(err);
    document.getElementById("total").innerText = "Error";
  });





// area count akhan theke suru
let areaCount = {};
let categoryCount = {};

// Fetch data
fetch("https://opensheet.elk.sh/1uzehSN2lGI6gNlM8w3eHEEbyZ14UcoRCBuOldH0Rljc/Sheet2")
  .then(res => res.json())
  .then(data => {

    document.getElementById("total").innerText = data.length;

    data.forEach(item => {

      // Area count
      if (item.Address) {
        areaCount[item.Address] = (areaCount[item.Address] || 0) + 1;
      }

      // Category count
      if (item.Category) {
        categoryCount[item.Category] = (categoryCount[item.Category] || 0) + 1;
      }

    });

  });

// Show Area
function showArea() {
  let html = "";
  for (let area in areaCount) {
    html += `<li>${area}: ${areaCount[area]} জন</li>`;
  }
  document.getElementById("dataList").innerHTML = html;
}

// Show Category
function showCategory() {
  let html = "";
  for (let cat in categoryCount) {
    html += `<li>${cat}: ${categoryCount[cat]} জন</li>`;
  }
  document.getElementById("dataList").innerHTML = html;
}
</script>
</body>
