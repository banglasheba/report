  <script>
    const sheetURL =
      "https://opensheet.elk.sh/1uzehSN2lGI6gNlM8w3eHEEbyZ14UcoRCBuOldH0Rljc/Sheet1";

    let allData = [];
    let displayIndex = 0;
    const batchSize = 50;

    async function fetchData() {
      const res = await fetch(sheetURL);
      allData = await res.json();
      loadMore();
    }

    function loadMore() {
      const tableBody = document.getElementById("tableBody");
      const nextIndex = displayIndex + batchSize;
      const chunk = allData.slice(displayIndex, nextIndex);

      chunk.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.TimeStamp}</td>
          <td>${row.Pname}</td>
          <td>${row.Address}</td>
          <td><a href="tel:${row.Whatsapp}">${row.Whatsapp}</a></td>
          <td><a href="https://wa.me/${row.Whatsapp}" target="_blank">${row.Whatsapp}</a></td>
          <td>${row.Category}</td>
          <td>${row.Code}</td>
          <td>
                <button onclick="alert('${row.Description.replace(/'/g, "\\'")}')">massege</button>
            </td>
          <td>${row.Taka}</td>
          <td>
                <button onclick="window.open('${row.Image}', '_blank')">View</button>
            </td>
        `;
        tableBody.appendChild(tr);
      });

      displayIndex = nextIndex;

      if (displayIndex >= allData.length) {
        document.getElementById("loadMoreBtn").style.display = "none";
      }
    }

    function searchTable() {
      const value = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#dataTable tbody tr");

      rows.forEach((row) => {
        row.style.display = row.innerText.toLowerCase().includes(value)
          ? ""
          : "none";
      });
    }

    function showTotalStudents() {
      alert(`Total: ${allData.length}`);
    }

    function showByDistrict() {
      const map = {};
      allData.forEach((d) => {
        map[d.Address] = (map[d.Address] || 0) + 1;
      });

      let text = "Address:\n";
      Object.keys(map).forEach((Address) => {
        text += `${Address}: ${map[Address]} student\n`;
      });

      alert(text);
    }

 // Donate Form

      .then(()=>{alert(" Islami Academy  has been added,but sometime under review  ");closeDonateForm();});
    }

    
function showByCategory() {

      });

      Object.keys(map).forEach((Category) => {
        text += `${Category}: ${map[Category]} student\n`;
      });

      alert(text);
    }

    
    function showToday() {
  const now = new Date();
  const d = now.getDate();
  const m = now.getMonth();
  const y = now.getFullYear();

  const count = allData.filter((row) => {
    const t = new Date(row.Timestamp);
    return (
      t.getDate() === d &&
      t.getMonth() === m &&
      t.getFullYear() === y
    );
  }).length;

  alert(`Today: ${count} student`);
}

    function showThisMonth() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const year = now.getFullYear();

      const count = allData.filter((d) => {
        const date = new Date(d.Timestamp);
        return (
          date.getMonth() + 1 === month &&
          date.getFullYear() === year
        );
      }).length;

      alert(`month: ${count} studen`);
    }

    function showTotalMoney() {
      const total = allData.reduce((sum, d) => sum + Number(d.Taka || 0), 0);
      alert(`Total tk: ${total} tk`);
    }

    function showTotalDeposit() {
      const total = allData.reduce((sum, d) => sum + Number(d.Joma || 0), 0);
      alert(`joma: ${total} tk`);
    }

    fetchData();
  </script>

<script>
fetch("https://opensheet.elk.sh/1uzehSN2lGI6gNlM8w3eHEEbyZ14UcoRCBuOldH0Rljc/Sheet1")
  .then(res => res.json())
  .then(data => {

    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];

    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();

    let total = 0;
    let todayCount = 0;
    let monthCount = 0;

    data.forEach(item => {

      total++;

      // Timestamp না থাকলে skip
      if (!item.TimeStamp) return;

      let itemDate = new Date(item.TimeStamp);

      // invalid date skip
      if (isNaN(itemDate)) return;

      let itemDateStr = itemDate.toISOString().split('T')[0];

      // আজকের count
      if (itemDateStr === todayStr) {
        todayCount++;
      }

      // এই মাসের count
      if (
        itemDate.getMonth() === currentMonth &&
        itemDate.getFullYear() === currentYear
      ) {
        monthCount++;
      }

    });

    document.getElementById("total").innerText = total;
    document.getElementById("today").innerText = todayCount;
    document.getElementById("month").innerText = monthCount;

  })
  .catch(err => {
    console.error(err);
    document.getElementById("total").innerText = "Error";
  });





// area count akhan theke suru
let areaCount = {};
let categoryCount = {};

// Fetch data
fetch("https://opensheet.elk.sh/1uzehSN2lGI6gNlM8w3eHEEbyZ14UcoRCBuOldH0Rljc/Sheet1")
  .then(res => res.json())
  .then(data => {

    document.getElementById("total").innerText = data.length;

    data.forEach(item => {

      // Area count
      if (item.Address) {
        areaCount[item.Address] = (areaCount[item.Address] || 0) + 1;
      }

      // Category count
      if (item.Category) {
        categoryCount[item.Category] = (categoryCount[item.Category] || 0) + 1;
      }

    });

  });

// Show Area
function showArea() {
  let html = "";
  for (let area in areaCount) {
    html += `<li>${area}: ${areaCount[area]} জন</li>`;
  }
  document.getElementById("dataList").innerHTML = html;
}

// Show Category
function showCategory() {
  let html = "";
  for (let cat in categoryCount) {
    html += `<li>${cat}: ${categoryCount[cat]} জন</li>`;
  }
  document.getElementById("dataList").innerHTML = html;
}
</script>
